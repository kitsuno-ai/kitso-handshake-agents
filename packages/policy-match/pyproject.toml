[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "kitso-policy-match"
version = "0.2.1"
description = "Reference v0.2 handshake policy evaluator for the Kitso Handshake protocol."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "Kitsuno", email = "handshake@kitsuno.ai" }]
keywords = ["handshake", "hiring", "agents", "a2a", "kitsuno"]
classifiers = [
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Operating System :: OS Independent",
    "Topic :: Internet",
]
dependencies = []

[project.urls]
Homepage = "https://kitsuno.ai/handshake/v0.2/"
Repository = "https://github.com/kitsuno-ai/kitso-handshake-agents"
Spec = "https://github.com/kitsuno-ai/kitso-handshake"
Issues = "https://github.com/kitsuno-ai/kitso-handshake-agents/issues"

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.setuptools.packages.find]
where = ["src"]
