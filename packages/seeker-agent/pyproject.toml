[project]
name = "seeker-agent"
version = "0.2.0"
description = "Read-side reference agent for the Kitso Handshake protocol: classify posts, gate, optionally initiate handshakes."
authors = [
    {name = "Kitsuno", email = "hello@kitsuno.ai"},
]
license = {text = "Apache-2.0"}
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "jsonschema>=4.21.0",
    "pydantic>=2.6.0",
    "pydantic-settings>=2.2.0",
    "psycopg2-binary>=2.9.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-httpx>=0.30.0",
    "ruff>=0.5.0",
]

[project.scripts]
seeker-agent = "seeker_agent.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/seeker_agent"]

[tool.hatch.build.targets.wheel.shared-data]
"src/seeker_agent/prompts" = "seeker_agent/prompts"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B", "UP", "S"]
ignore = ["S101"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
