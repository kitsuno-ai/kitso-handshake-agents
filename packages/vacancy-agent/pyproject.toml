[project]
name = "vacancy-agent"
version = "0.1.0"
description = "Deterministic write-only Vacancy Agent for the Kitso Handshake protocol"
authors = [
    {name = "Kitsuno", email = "hello@kitsuno.ai"},
]
license = {text = "Apache-2.0"}
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "jsonschema>=4.21.0",
    "pydantic>=2.6.0",
    "pydantic-settings>=2.2.0",
    "psycopg2-binary>=2.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-httpx>=0.30.0",
    "ruff>=0.5.0",
]

[project.scripts]
vacancy-agent = "vacancy_agent.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vacancy_agent"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B", "UP", "S"]
ignore = ["S101"]  # allow asserts in tests

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
